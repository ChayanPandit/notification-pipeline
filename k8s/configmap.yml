apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-pipeline-config
  namespace: notification-pipeline
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/notification_pipeline
  SPRING_KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
  SERVER_PORT: "8080"
  SPRING_JPA_HIBERNATE_DDL_AUTO: validate
  SPRING_FLYWAY_ENABLED: "true"