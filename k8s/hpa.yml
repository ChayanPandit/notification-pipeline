apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-pipeline-hpa
  namespace: notification-pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-pipeline
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70